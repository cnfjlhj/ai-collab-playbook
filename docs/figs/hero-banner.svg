<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="240" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.035">
    <line x1="40" y1="0" x2="40" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="280" y1="0" x2="280" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="440" y1="0" x2="440" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="520" y1="0" x2="520" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="680" y1="0" x2="680" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="760" y1="0" x2="760" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="880" y2="40" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="880" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="880" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="880" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="880" y2="200" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Collaborative nodes (left side) -->
  <g transform="translate(85, 90)">
    <!-- Human node -->
    <circle cx="0" cy="0" r="16" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#10b981">H</text>

    <!-- AI node 1 -->
    <circle cx="50" cy="-30" r="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="50" y="-26" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b5cf6">AI</text>

    <!-- AI node 2 -->
    <circle cx="55" cy="30" r="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="55" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b5cf6">AI</text>

    <!-- Connection lines -->
    <line x1="14" y1="-8" x2="38" y2="-24" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <line x1="14" y1="8" x2="43" y2="24" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="-18" x2="55" y2="18" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>

    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.2"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- Title -->
  <text x="440" y="88" text-anchor="middle"
        font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif"
        font-size="40" font-weight="700" fill="#fafafa" letter-spacing="-0.5">
    AI Collab Playbook
  </text>

  <!-- Tagline -->
  <text x="440" y="122" text-anchor="middle"
        font-family="'Droid Sans Fallback', 'AR PL UMing CN', sans-serif"
        font-size="17" fill="#a1a1aa">
    面向科研、写作、阅读和编程的 AI 协作实战手册
  </text>

  <!-- Accent line -->
  <rect x="365" y="140" width="150" height="2.5" rx="1.25" fill="url(#accent)"/>

  <!-- Topic pills -->
  <g transform="translate(440, 175)" text-anchor="middle"
     font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif" font-size="12">
    <rect x="-225" y="-12" width="86" height="24" rx="12" fill="#1e293b" stroke="#3f3f46" stroke-width="1"/>
    <text x="-182" y="4" fill="#d4d4d8">Prompts</text>

    <rect x="-125" y="-12" width="72" height="24" rx="12" fill="#1e293b" stroke="#3f3f46" stroke-width="1"/>
    <text x="-89" y="4" fill="#d4d4d8">Skills</text>

    <rect x="-37" y="-12" width="96" height="24" rx="12" fill="#1e293b" stroke="#3f3f46" stroke-width="1"/>
    <text x="11" y="4" fill="#d4d4d8">Workflows</text>

    <rect x="75" y="-12" width="76" height="24" rx="12" fill="#1e293b" stroke="#3f3f46" stroke-width="1"/>
    <text x="113" y="4" fill="#d4d4d8">Agents</text>

    <rect x="167" y="-12" width="60" height="24" rx="12" fill="#1e293b" stroke="#3f3f46" stroke-width="1"/>
    <text x="197" y="4" fill="#d4d4d8">Rules</text>
  </g>

  <!-- Decorative right-side elements -->
  <g opacity="0.06" transform="translate(740, 70)">
    <!-- Code brackets -->
    <text font-family="'JetBrains Mono', monospace" font-size="48" fill="#10b981">{ }</text>
    <text x="-10" y="60" font-family="'JetBrains Mono', monospace" font-size="14" fill="#a1a1aa">def collaborate():</text>
    <text x="-10" y="80" font-family="'JetBrains Mono', monospace" font-size="14" fill="#a1a1aa">    return results</text>
  </g>
</svg>
